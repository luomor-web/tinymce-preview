<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活动签到</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --gold-pale: #f5e9c6;
    --dark: #0d0d14;
    --dark-2: #161622;
    --dark-3: #1e1e2e;
    --dark-4: #28283c;
    --text-primary: #f0ead8;
    --text-secondary: #a89f87;
    --text-muted: #6b6460;
    --border: rgba(201,168,76,0.25);
    --border-bright: rgba(201,168,76,0.6);
    --radius: 16px;
    --radius-sm: 8px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    color: var(--text-primary);
    font-family: 'Noto Sans SC', sans-serif;
    overflow: hidden;
  }

  /* ──────── BACKGROUND ──────── */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a1630 0%, var(--dark) 60%);
  }
  .bg-layer::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle 400px at 10% 80%, rgba(201,168,76,0.04) 0%, transparent 70%),
      radial-gradient(circle 300px at 90% 20%, rgba(201,168,76,0.06) 0%, transparent 70%);
  }
  /* decorative lines */
  .bg-lines {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* ──────── LAYOUT ──────── */
  .page {
    position: relative; z-index: 1;
    width: 100%; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 48px;
    gap: 0;
  }

  /* ──────── HEADER ──────── */
  .header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 32px;
    animation: fadeDown 0.8s ease both;
  }
  .header-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    max-width: 200px;
  }
  .header-badge {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 6px;
    color: var(--gold);
    text-transform: uppercase;
    padding: 6px 20px;
    border: 1px solid var(--border-bright);
    border-radius: 40px;
    white-space: nowrap;
  }

  /* ──────── MAIN CARD ──────── */
  .main-card {
    width: 100%;
    max-width: 1100px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--dark-2);
    animation: fadeUp 0.9s ease 0.2s both;
    box-shadow: 0 40px 120px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.1);
  }

  /* LEFT — cover image */
  .card-left {
    position: relative;
    min-height: 560px;
    overflow: hidden;
  }
  .cover-img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 8s ease;
  }
  .cover-img:hover { transform: scale(1.04); }
  .cover-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(13,13,20,0.1) 0%, rgba(13,13,20,0.35) 100%);
  }
  .cover-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: var(--dark-3);
    color: var(--text-muted);
    font-size: 15px;
  }

  /* RIGHT — info + qrcode */
  .card-right {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 40px;
    gap: 36px;
    border-left: 1px solid var(--border);
    position: relative;
  }
  .card-right::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .activity-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(22px, 3vw, 34px);
    font-weight: 700;
    line-height: 1.4;
    color: var(--text-primary);
    text-align: center;
    letter-spacing: 1px;
  }
  .title-underline {
    width: 48px; height: 2px;
    background: var(--gold);
    margin: 0 auto;
    border-radius: 2px;
  }

  /* QR container */
  .qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
  }
  .qr-label {
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 500;
  }
  .qr-frame {
    position: relative;
    padding: 12px;
    background: #fff;
    border-radius: var(--radius-sm);
    box-shadow: 0 0 0 1px var(--border-bright), 0 8px 32px rgba(0,0,0,0.4);
  }
  .qr-frame img {
    display: block;
    width: 200px; height: 200px;
    border-radius: 4px;
  }
  /* corner deco */
  .qr-frame::before, .qr-frame::after,
  .qr-corner-bl, .qr-corner-br {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--gold);
    border-style: solid;
  }
  .qr-frame::before { top: -4px; left: -4px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .qr-frame::after  { top: -4px; right: -4px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .qr-corner-bl { bottom: -4px; left: -4px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .qr-corner-br { bottom: -4px; right: -4px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

  .qr-hint {
    font-size: 13px;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.8;
  }

  /* ──────── REFRESH COUNTDOWN ──────── */
  .refresh-bar-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .refresh-text {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }
  .refresh-track {
    width: 100%;
    height: 2px;
    background: rgba(201,168,76,0.12);
    border-radius: 2px;
    overflow: hidden;
  }
  .refresh-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-light), var(--gold));
    border-radius: 2px;
    width: 100%;
    transform-origin: left;
    transition: transform 1s linear;
  }

  /* ──────── LOGIN OVERLAY ──────── */
  .login-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: rgba(13,13,20,0.92);
    backdrop-filter: blur(8px);
    animation: fadeIn 0.4s ease both;
  }
  .login-box {
    background: var(--dark-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.15);
    animation: slideUp 0.5s cubic-bezier(.22,.68,0,1.2) 0.1s both;
  }
  .login-top {
    text-align: center;
    margin-bottom: 36px;
  }
  .login-icon {
    width: 56px; height: 56px;
    border: 1px solid var(--border-bright);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    background: rgba(201,168,76,0.06);
  }
  .login-icon svg { width: 24px; height: 24px; fill: var(--gold); }
  .login-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .field input {
    width: 100%;
    padding: 12px 16px;
    background: var(--dark-4);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus {
    border-color: var(--border-bright);
  }
  .field input::placeholder {
    color: var(--text-muted);
  }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--gold) 0%, #a8752e 100%);
    border: none;
    border-radius: var(--radius-sm);
    color: #0d0d14;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 4px;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .btn-login:hover { opacity: 0.9; }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

  .login-err {
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(220,80,60,0.12);
    border: 1px solid rgba(220,80,60,0.3);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: #e57a6d;
    text-align: center;
    display: none;
  }
  .login-err.show { display: block; }

  /* ──────── LOADING / SPINNER ──────── */
  .spinner-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    padding: 20px 0;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid rgba(201,168,76,0.15);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .spinner-label { font-size: 13px; color: var(--text-muted); }

  /* ──────── ANIMATIONS ──────── */
  @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
  @keyframes fadeUp  { from { opacity:0; transform:translateY(24px) } to { opacity:1; transform:none } }
  @keyframes fadeDown{ from { opacity:0; transform:translateY(-16px) } to { opacity:1; transform:none } }
  @keyframes slideUp { from { opacity:0; transform:translateY(32px) } to { opacity:1; transform:none } }
  @keyframes spin    { to { transform: rotate(360deg) } }
  @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* ──────── RESPONSIVE ──────── */
  @media (max-width: 800px) {
    .main-card { grid-template-columns: 1fr; max-width: 480px; }
    .card-left { min-height: 240px; }
    .card-right { padding: 32px 24px; }
    .page { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-lines"></div>

<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-top">
      <div class="login-icon">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      </div>
      <div class="login-title">管理员登录</div>
      <div class="login-sub">请输入账号密码以查看签到二维码</div>
    </div>
    <div class="field">
      <label>用户名</label>
      <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <div class="login-err" id="loginErr"></div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">登 录</button>
  </div>
</div>

<!-- MAIN PAGE -->
<div class="page" id="mainPage" style="display:none">
  <div class="header">
    <div class="header-line"></div>
    <div class="header-badge" id="headerBadge">活动签到</div>
    <div class="header-line"></div>
  </div>

  <div class="main-card">
    <!-- LEFT: cover -->
    <div class="card-left" id="cardLeft">
      <div class="cover-placeholder" id="coverPlaceholder">
        <div class="spinner-wrap">
          <div class="spinner"></div>
          <span class="spinner-label">加载中…</span>
        </div>
      </div>
    </div>

    <!-- RIGHT: title + qr -->
    <div class="card-right">
      <div style="display:flex;flex-direction:column;align-items:center;gap:12px;width:100%">
        <div class="activity-title" id="activityTitle">加载中…</div>
        <div class="title-underline"></div>
      </div>

      <div class="qr-section" id="qrSection">
        <div class="qr-label">扫码签到</div>
        <div class="qr-frame" id="qrFrame">
          <div class="qr-corner-bl"></div>
          <div class="qr-corner-br"></div>
          <div class="spinner-wrap" id="qrLoading">
            <div class="spinner"></div>
            <span class="spinner-label">生成中…</span>
          </div>
        </div>
        <div class="qr-hint" id="qrHint">微信扫一扫<br>完成活动签到</div>
      </div>

      <div class="refresh-bar-wrap">
        <div class="refresh-text" id="refreshText">15 秒后刷新二维码</div>
        <div class="refresh-track">
          <div class="refresh-fill" id="refreshFill"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = 'https://xlab.wepromo.cn/api';
const REFRESH_INTERVAL = 15;

// Parse URL param ?id=xxx, default 174
const urlParams = new URLSearchParams(location.search);
const ACTIVITY_ID = urlParams.get('id') || '174';

let countdown = REFRESH_INTERVAL;
let countdownTimer = null;
let qrImgEl = null;

// ── Input enter key
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginErr');
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  if (!u || !p) { showErr('请填写用户名和密码'); return; }

  btn.disabled = true;
  btn.textContent = '登录中…';
  errEl.classList.remove('show');

  try {
    const res = await fetch(`${API_BASE}/signadmin/activity/signPageLogin/${ACTIVITY_ID}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (data.code === 0) {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('mainPage').style.display = 'flex';
      await loadActivity();
      loadQR();
      startCountdown();
    } else {
      showErr(data.message || data.msg || '账号或密码错误');
    }
  } catch(e) {
    showErr('网络异常，请稍后重试');
  } finally {
    btn.disabled = false;
    btn.textContent = '登 录';
  }
}

function showErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg;
  el.classList.add('show');
}

async function loadActivity() {
  try {
    const res = await fetch(`${API_BASE}/activity/${ACTIVITY_ID}`, { credentials: 'include' });
    const data = await res.json();
    const info = data.data || data;
    const title = info.title || info.name || '活动签到';
    const cover = info.cover;

    document.getElementById('activityTitle').textContent = title;
    document.getElementById('headerBadge').textContent = title.length > 10 ? '活动签到' : title;
    document.title = title + ' · 签到';

    const leftEl = document.getElementById('cardLeft');
    if (cover) {
      leftEl.innerHTML = `<img class="cover-img" src="${cover}" alt="活动封面"><div class="cover-overlay"></div>`;
    } else {
      leftEl.innerHTML = `<div class="cover-placeholder" style="font-size:14px;color:var(--text-muted)">暂无封面</div>`;
    }
  } catch(e) {
    document.getElementById('activityTitle').textContent = '活动签到';
  }
}

async function loadQR() {
  const frame = document.getElementById('qrFrame');
  frame.innerHTML = `<div class="qr-corner-bl"></div><div class="qr-corner-br"></div><div class="spinner-wrap" id="qrLoading"><div class="spinner"></div><span class="spinner-label">生成中…</span></div>`;

  try {
    const res = await fetch(`${API_BASE}/signadmin/activity/sign-in-qrcode/${ACTIVITY_ID}`, { credentials: 'include' });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    frame.innerHTML = `<div class="qr-corner-bl"></div><div class="qr-corner-br"></div><img src="${url}" alt="签到二维码" style="display:block;width:200px;height:200px;border-radius:4px;">`;
  } catch(e) {
    frame.innerHTML = `<div class="qr-corner-bl"></div><div class="qr-corner-br"></div><div style="width:200px;height:200px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-muted);padding:16px;text-align:center;">二维码加载失败</div>`;
  }
}

function startCountdown() {
  countdown = REFRESH_INTERVAL;
  updateBar();
  countdownTimer = setInterval(() => {
    countdown--;
    updateBar();
    if (countdown <= 0) {
      countdown = REFRESH_INTERVAL;
      loadQR();
    }
  }, 1000);
}

function updateBar() {
  const fill = document.getElementById('refreshFill');
  const text = document.getElementById('refreshText');
  const pct = countdown / REFRESH_INTERVAL;
  fill.style.transform = `scaleX(${pct})`;
  text.textContent = `${countdown} 秒后刷新二维码`;
}
</script>
</body>
</html>
